setting_1 : "<u><b>{0} సెట్టింగ్స్ ప్యానెల్</b></u>\n\n<b>చాట్ ఐడీ :</b> <code>{1}</code>\n<b>చాట్ టైటిల్ :</b> {2}\n\nసెట్టింగ్స్ మార్చడానికి దిగువ బటన్‌లపై క్లిక్ చేయండి."
setting_2 : "» డైరెక్ట్ : శోధన ప్రశ్నలను నేరుగా ప్లే చేస్తుంది.\n\n» ఇన్‌లైన్ : వీడియో మరియు ఆడియో ఎంచుకోవడానికి ఇన్‌లైన్ బటన్‌లను తిరిగి ఇస్తుంది."
setting_3 : "ఎవరైనా : ఈ గ్రూప్‌లో ఎవరైనా అడ్మిన్ ఆదేశాలను ఉపయోగించవచ్చు [స్కిప్, పాజ్, రీజ్యూమ్ మొదలైనవి].\n\nఅడ్మిన్ మాత్రమే : అడ్మిన్‌లు మరియు అధికృత వినియోగదారులు మాత్రమే అడ్మిన్ ఆదేశాలను ఉపయోగించవచ్చు."
