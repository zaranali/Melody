start_1 : "✨ {0} చురుకుగా ఉండి నడుస్తోంది.\n\n<b>🚀 అప్‌టైమ్:</b> {1}"
start_2 : "<b>✧ హే</b> <b>{0}</b> ✨\n\n<b>❖ స్వాగతం</b> <b>{1}</b>\n\n<b>➤ టెలిగ్రామ్ వాయిస్ చాట్‌ల కోసం రూపొందించబడిన స్మార్ట్ & సొగసైన సంగీత బాట్.</b>\n\n<b>✦ సిస్టమ్ స్థితి :</b>\n<b>├ అప్‌టైమ్ :</b> {2}\n<b>├ స్టోరేజ్ :</b> {3}\n<b>├ సిపియు :</b> {4}%\n<b>└ ర్యామ్ :</b> {5}%\n\n<b>✦ ఆనందించండి :</b> <b>స్మూత్ ప్లేబ్యాక్ • హెచ్‌డి సౌండ్ • లాగ్ లేదు 🎧</b>\n\n<b>➥ అన్ని ఫీచర్‌లను అన్వేషించడానికి దిగువ బటన్‌లపై నొక్కండి.</b>"
start_3 : "హే {0},\nఇది {1}\n\n{2} లో నన్ను జోడించినందుకు ధన్యవాదాలు, {3} ఈ చాట్‌లో పాటలను ప్లే చేయగలదు."
start_4 : "<b>సూపర్‌గ్రూప్ అవసరం</b>\n\nపరచేసి మీ <b>గ్రూప్</b> ను <b>సూపర్‌గ్రూప్</b> గా మార్చి మళ్లీ నన్ను జోడించండి.\n\n<b>సూపర్‌గ్రూప్ ఎలా తయారు చేయాలి ?</b>\n- మీ గ్రూప్ యొక్క చాట్ హిస్టరీని <b>దృశ్యమానం</b> చేయండి."
start_5 : "<b>బ్లాక్‌లిస్ట్ చేయబడిన చాట్స్</b>\n\nఈ చాట్ {0} డేటాబేస్‌లో బ్లాక్‌లిస్ట్ చేయబడింది.\nమీ చాట్‌ను అన్‌బ్లాక్ చేయడానికి <a href={1}>సూడోయూజర్</a> ను అభ్యర్థించండి లేదా <a href={2}>సపోర్ట్ చాట్.</a> ను సందర్శించండి"
start_6 : "<b>ట్రాక్ సమాచారం</b>\n\n📌 <b>టైటిల్ :</b> {0}\n\n⏳ <b>వ్యవధి :</b> {1} నిమిషాలు\n👀 <b>వీక్షణలు :</b> <code>{2}</code>\n⏰ <b>ప్రచురించబడిన తేదీ :</b> {3}\n📎 <b>ఛానెల్ :</b> <a href={4}>{5}</a>\n\n<u><b>శోధన {6} ద్వారా నడపబడుతుంది</b></u>"

