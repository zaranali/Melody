setting_5 : "గ్రూప్ : ఆదేశాలు ఇవ్వబడిన గ్రూప్‌లో సంగీతాన్ని ప్లే చేస్తుంది.\n\n» ఛానెల్ : మీరు కోరుకున్న ఛానెల్‌లో సంగీతాన్ని ప్లే చేస్తుంది. ఛానెల్ ఐడీని సెట్ చేయండి"
setting_6 : "ఎవరైనా : ఈ గ్రూప్‌లో ఉన్న ఎవరైనా ఇక్కడ సంగీతాన్ని ప్లే చేయవచ్చు.\n\nఅడ్మిన్ మాత్రమే : అడ్మిన్‌లు మాత్రమే ఈ గ్రూప్‌లో సంగీతాన్ని ప్లే చేయవచ్చు."
